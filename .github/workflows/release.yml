name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.0.0)
        required: true
      changelog:
        description: Changelog (markdown)
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - mc_target: '26'
            java_version: '25'
            game_version_range: '26.x.x'
            modrinth_game_versions: |-
              26.2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version metadata
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
            RELEASE_TAG="v${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          GAME_VERSION_RANGE="${{ matrix.game_version_range }}"
          MODRINTH_VERSION="${VERSION}+${GAME_VERSION_RANGE}"
          MODRINTH_NAME="BetterAdmin [v${VERSION}+${GAME_VERSION_RANGE}]"
          JAR_FILE="betteradmin-${VERSION}-${GAME_VERSION_RANGE}.jar"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MODRINTH_VERSION=$MODRINTH_VERSION" >> "$GITHUB_ENV"
          echo "MODRINTH_NAME=$MODRINTH_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "JAR_FILE=$JAR_FILE" >> "$GITHUB_ENV"

      - name: Set changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          MANUAL_CHANGELOG: ${{ github.event.inputs.changelog }}
        run: |
          {
            echo 'CHANGELOG<<EOF'
            if [ "${{ github.event_name }}" = "release" ]; then
              printf '%s\n' "$RELEASE_BODY"
            else
              printf '%s\n' "$MANUAL_CHANGELOG"
            fi
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: temurin
          cache: gradle

      - name: Ensure Gradle wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading missing gradle-wrapper.jar"
            mkdir -p gradle/wrapper
            curl -L -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-9.2.1-bin.zip
            unzip -p /tmp/gradle.zip gradle/wrapper/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -PreleaseVersion="$VERSION" -PmcTarget="${{ matrix.mc_target }}" -PgameVersionRange="${{ matrix.game_version_range }}"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: betteradmin
          name: ${{ env.MODRINTH_NAME }}
          version: ${{ env.MODRINTH_VERSION }}
          changelog: ${{ env.CHANGELOG }}
          loaders: |-
            paper
          game-versions: ${{ matrix.modrinth_game_versions }}
          files: build/libs/${{ env.JAR_FILE }}

      - name: Upload jar to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "build/libs/${JAR_FILE}" --clobber

  notify-discord:
    name: Discord notification
    needs: release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Set version metadata
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            GITHUB_RELEASE_URL="${{ github.event.release.html_url }}"
          else
            VERSION="${{ github.event.inputs.version }}"
            GITHUB_RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION#v}"
          fi
          VERSION="${VERSION#v}"
          MODRINTH_26_SLUG="${VERSION}%2B26.x.x"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "GITHUB_RELEASE_URL=$GITHUB_RELEASE_URL" >> "$GITHUB_ENV"
          echo "MODRINTH_26_URL=https://modrinth.com/plugin/betteradmin/version/${MODRINTH_26_SLUG}" >> "$GITHUB_ENV"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping Discord notification."
            exit 0
          fi

          CONTENT=$(printf '%s\n' \
            "@everyone" \
            "" \
            "**BetterAdmin v${VERSION}** is out!" \
            "" \
            "GitHub release: ${GITHUB_RELEASE_URL}" \
            "Modrinth: ${MODRINTH_26_URL}")

          jq -n \
            --arg content "$CONTENT" \
            '{ content: $content, allowed_mentions: { parse: ["everyone"] } }' | curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d @- \
            "$DISCORD_WEBHOOK_URL"
